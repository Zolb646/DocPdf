services:
  - type: web
    name: docpdf-gotenberg
    runtime: docker
    rootDir: gotenberg
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: free
    autoDeployTrigger: off
    envVars:
      - key: API_PORT_FROM_ENV
        value: PORT
      - key: API_START_TIMEOUT
        value: 60s
      - key: CHROMIUM_AUTO_START
        value: "true"
      - key: CHROMIUM_START_TIMEOUT
        value: 60s
      - key: LIBREOFFICE_AUTO_START
        value: "true"
      - key: LIBREOFFICE_START_TIMEOUT
        value: 60s

  - type: web
    name: docpdf-backend
    runtime: node
    rootDir: back-end
    buildCommand: bun install --frozen-lockfile
    startCommand: bun run start
    healthCheckPath: /api/health
    plan: free
    autoDeployTrigger: off
    envVars:
      - key: GOTENBERG_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: CHROMIUM_EMULATED_MEDIA_TYPE
        value: screen
      - key: CHROMIUM_PRINT_BACKGROUND
        value: "true"
      - key: CHROMIUM_SKIP_NETWORK_ALMOST_IDLE_EVENT
        value: "false"
      - key: CHROMIUM_FAIL_ON_RESOURCE_LOADING_FAILED
        value: "false"
      - key: MAX_UPLOAD_SIZE_BYTES
        value: "26214400"
      - key: REQUEST_TIMEOUT_MS
        value: "60000"
